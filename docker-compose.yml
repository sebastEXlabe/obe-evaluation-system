services:

  # ==================== Infrastructure ====================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: obe-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-obe_evaluation}
      POSTGRES_USER:     ${POSTGRES_USER:-obe_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ObePass123!}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./init-data.sql:/docker-entrypoint-initdb.d/02-init-data.sql
    restart: unless-stopped
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-obe_admin} -d ${POSTGRES_DB:-obe_evaluation}"]
      interval: 5s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    container_name: obe-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  5

  minio:
    image: minio/minio:latest
    container_name: obe-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  maxkb:
    image: 1panel/maxkb:v2.10.3-lts
    container_name: obe-maxkb
    ports:
      - "${MAXKB_PORT:-8080}:8080"
      - "5433:5432"
    volumes:
      - maxkb_data:/var/lib/postgresql
      - maxkb_static:/opt/maxkb
    restart: unless-stopped

  # ==================== Application ====================

  obe-server:
    build:
      context:    ./obe-server
      dockerfile: Dockerfile
    container_name: obe-server
    ports:
      - "${SERVER_PORT:-8989}:8989"
    environment:
      SERVER_PORT:        8989
      DB_URL:             ${DB_URL:-jdbc:postgresql://postgres:5432/obe_evaluation}
      DB_USERNAME:        ${DB_USERNAME:-obe_admin}
      DB_PASSWORD:        ${DB_PASSWORD:-ObePass123!}
      MINIO_ENDPOINT:     ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY:   ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:   ${MINIO_SECRET_KEY:-minioadmin}
      MAXKB_BASE_URL:     ${MAXKB_BASE_URL:-http://maxkb:8080}
      MAXKB_API_KEY:      ${MAXKB_API_KEY:-sk-obe-cdio-evaluation-maxkb-2026}
      MAXKB_DB_URL:       jdbc:postgresql://maxkb:5432/maxkb
      MAXKB_DB_USERNAME:  root
      MAXKB_DB_PASSWORD:  maxkb123
      DEEPSEEK_API_KEY:   ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL:  ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL:     ${DEEPSEEK_MODEL:-deepseek-chat}
      JWT_SECRET:         ${JWT_SECRET:-obe-cdio-evaluation-jwt-secret-key-2026}
      JWT_EXPIRATION:     ${JWT_EXPIRATION:-86400000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:8989/doc.html"]
      interval: 15s
      timeout:  10s
      retries:  3
      start_period: 60s

  obe-web:
    build:
      context:    ./obe-web
      dockerfile: Dockerfile
    container_name: obe-web
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - maxkb_static:/opt/maxkb-static:ro
    depends_on:
      obe-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
  maxkb_data:
  maxkb_static:
