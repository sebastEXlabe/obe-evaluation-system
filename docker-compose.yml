services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: obe-postgres
    environment:
      POSTGRES_DB: obe_evaluation
      POSTGRES_USER: obe_admin
      POSTGRES_PASSWORD: ObePass123!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obe_admin -d obe_evaluation"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: obe-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: obe-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  maxkb:
    image: 1panel/maxkb:v2.10.3-lts
    container_name: obe-maxkb
    ports:
      - "8080:8080"
    volumes:
      - maxkb_data:/var/lib/postgresql
      - maxkb_static:/opt/maxkb
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
  maxkb_data:
  maxkb_static:

