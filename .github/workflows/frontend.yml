name: Frontend CI

on:
  push:
    paths: ['obe-web/**']
  pull_request:
    paths: ['obe-web/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: obe-web/package-lock.json
      - name: Install & Build
        working-directory: obe-web
        run: |
          npm ci
          npm run build
