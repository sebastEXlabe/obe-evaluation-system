config:
    name: "type_match_test"
    base_url: "http://localhost:8989"
    export: ["token"]

teststeps:
-   name: "login"
    request:
        method: POST
        url: "/api/auth/login"
        headers: { Content-Type: "application/json" }
        json: { username: "testadm", password: "admin123" }
    extract:
        token: body.data.token
    validate:
        - eq: ["status_code", 200]

-   name: "groups_list"
    request:
        method: GET
        url: "/api/groups"
        headers: { Authorization: "Bearer $token" }
    validate:
        - eq: ["status_code", 200]
        - len_gt: ["body.data.records", 0]

-   name: "group_members_type_match"
    request:
        method: GET
        url: "/api/groups/1/members"
        headers: { Authorization: "Bearer $token" }
    validate:
        - eq: ["status_code", 200]
        - type_match: ["body.data.0.realName", "str"]
