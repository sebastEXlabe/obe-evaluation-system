config:
    name: "全端点响应格式验证"
    base_url: "http://localhost:8989"
    export: ["token"]

teststeps:

-   name: "login"
    request:
        method: POST
        url: "/api/auth/login"
        headers:
            Content-Type: "application/json"
        json:
            username: "testadm"
            password: "admin123"
    extract:
        token: body.data.token
    validate:
        - eq: ["status_code", 200]
        - eq: ["body.code", 200]

-   name: "get_courses"
    request:
        method: GET
        url: "/api/courses"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]

-   name: "get_groups"
    request:
        method: GET
        url: "/api/groups"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]

-   name: "get_group_detail"
    request:
        method: GET
        url: "/api/groups/1"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }]

-   name: "get_course_tree"
    request:
        method: GET
        url: "/api/course/tree?courseId=1"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]

-   name: "get_evaluation_scores"
    request:
        method: GET
        url: "/api/evaluation/personal-scores?groupId=1"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]

-   name: "get_analysis_achievement"
    request:
        method: GET
        url: "/api/analysis/achievement?groupId=1"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]

-   name: "get_analysis_po"
    request:
        method: GET
        url: "/api/analysis/po-achievement?groupId=1"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]

-   name: "get_project_milestones"
    request:
        method: GET
        url: "/api/project/milestones?groupId=1"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]

-   name: "get_project_git_commits"
    request:
        method: GET
        url: "/api/project/git-commits?groupId=1"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]

-   name: "get_auth_users"
    request:
        method: GET
        url: "/api/auth/users"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]

-   name: "get_settings_profile"
    request:
        method: GET
        url: "/api/settings/profile"
        headers: { Authorization: "Bearer $token" }
    validate: [{ eq: ["status_code", 200] }, { eq: ["body.code", 200] }]
