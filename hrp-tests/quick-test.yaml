config:
    name: "quick"
    base_url: "http://localhost:8989"
    export: ["token"]

teststeps:
-   name: "login"
    request:
        method: POST
        url: "/api/auth/login"
        headers: { Content-Type: "application/json" }
        json: { username: "testadm", password: "admin123" }
    extract:
        token: body.data.token
    validate:
        - eq: ["status_code", 200]
-   name: "get_groups"
    request:
        method: GET
        url: "/api/groups"
        headers: { Authorization: "Bearer $token" }
    validate:
        - eq: ["status_code", 200]
-   name: "create_obj"
    request:
        method: POST
        url: "/api/course/objectives"
        headers: { Authorization: "Bearer $token", Content-Type: "application/json" }
        json: { objectiveNo: "HRP-QUICK", title: "Quick", dimension: "KNOWLEDGE", weight: 0.1, courseId: 1 }
    extract:
        oid: body.data.id
    validate:
        - eq: ["status_code", 200]
-   name: "delete_obj"
    request:
        method: DELETE
        url: "/api/course/objectives/$oid"
        headers: { Authorization: "Bearer $token" }
    validate:
        - eq: ["status_code", 200]
