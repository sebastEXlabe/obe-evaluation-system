config:
    name: "isolate"
    base_url: "http://localhost:8989"
    export: ["token"]

teststeps:
-   name: "login"
    request:
        method: POST
        url: "/api/auth/login"
        headers: { Content-Type: "application/json" }
        json: { username: "testadm", password: "admin123" }
    extract:
        token: body.data.token
    validate:
        - eq: ["status_code", 200]

-   name: "create_milestone"
    request:
        method: POST
        url: "/api/project/milestones"
        headers: { Authorization: "Bearer $token", Content-Type: "application/json" }
        json: { groupId: 1, title: "ISO里程碑", cdioPhase: "CONCEIVE", dueDate: "2026-12-31" }
    validate:
        - eq: ["status_code", 200]
