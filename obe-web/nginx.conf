server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip compression for JS/CSS assets
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 512;

    # Proxy API requests to Spring Boot backend
    location /api/ {
        proxy_pass http://obe-server:8989/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Authorization;
    }


    # Prevent caching of HTML entry point (JS files use content hashes)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # MaxKB proxy (same-origin)
    location /maxkb/ {
        proxy_pass http://obe-maxkb:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect / /maxkb/;
        proxy_cookie_path / /maxkb/;
    }

    # Serve MaxKB static assets directly from volume (bypass Django auth)
    location /maxkb/admin/assets/ {
        alias /opt/maxkb-static/admin/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /maxkb/favicon.ico {
        alias /opt/maxkb-static/admin/favicon.ico;
    }

    # SPA fallback (hash routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-busted assets (Vite content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
