server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip compression for JS/CSS assets
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 512;

    # Proxy API requests to Spring Boot backend
    location /api/ {
        proxy_pass http://obe-server:8989/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Authorization;
    }


    # Prevent caching of HTML entry point (JS files use content hashes)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # MaxKB entry — redirect to /admin/ where the SPA lives natively
    location = /maxkb/ { return 302 /admin/; }
    location = /maxkb/admin/ { return 302 /admin/; }
    location /maxkb/ {
        rewrite ^/maxkb/(.*)$ /$1 redirect;
    }
    location /admin/ {
        proxy_pass http://obe-maxkb:8080/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /chat/ {
        proxy_pass http://obe-maxkb:8080/chat/;
        proxy_set_header Host $host;
    }
    location /login/ {
        proxy_pass http://obe-maxkb:8080/login/;
        proxy_set_header Host $host;
    }

    # MaxKB API
    location /api/application/ {
        proxy_pass http://obe-maxkb:8080/api/application/;
        proxy_set_header Host $host;
    }
    location /api/user/ {
        proxy_pass http://obe-maxkb:8080/api/user/;
        proxy_set_header Host $host;
    }

    # MaxKB static assets (from volume, bypass Django auth)
    location /maxkb/admin/assets/ {
        alias /opt/maxkb-static/admin/assets/;
    }
    location /admin/assets/ {
        alias /opt/maxkb-static/admin/assets/;
    }

    # SPA fallback (hash routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-busted assets (Vite content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
